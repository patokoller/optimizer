name: Deploy

on:
  # Auto-deploy on merge to main. Manual dispatch remains available for
  # targeted (frontend/backend/worker) or staging deploys.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "all"
        type: choice
        options: [all, frontend, backend, worker]
      environment:
        description: "Environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

jobs:
  # ── CI gate ─────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Deploy frontend → Vercel ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(fromJSON('["all","frontend"]'), github.event.inputs.target)
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.vercel-deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: vercel-deploy
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"

  # ── Deploy backend → Railway ──────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Railway
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(fromJSON('["all","backend"]'), github.event.inputs.target)

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ github.event.inputs.environment || 'production' }} \
            --service ${{ secrets.RAILWAY_API_SERVICE_ID }}
          railway up --detach
          echo "✅ Backend API deployment triggered"

      - name: Wait for health check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Healthy after ${i}×5s"; exit 0; fi
            echo "Attempt $i: $STATUS — waiting 5s"
            sleep 5
          done
          echo "Health check timed out" && exit 1

      - name: Run migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --service ${{ secrets.RAILWAY_API_SERVICE_ID }}
          railway run alembic upgrade head

  # ── Deploy worker → Railway ───────────────────────────────────────────
  deploy-worker:
    name: Deploy worker → Railway
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(fromJSON('["all","worker"]'), github.event.inputs.target)

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ github.event.inputs.environment || 'production' }} \
            --service ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}
          railway up --detach
          echo "✅ Worker deployment triggered"
