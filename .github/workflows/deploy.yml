name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "all"
        type: choice
        options: [all, frontend, backend, worker]
      environment:
        description: "Environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-flight deployments

jobs:
  # ── Gate: CI must pass ──────────────────────────────────────────────
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Deploy frontend → Vercel ────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: ci-gate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["all","frontend"]'), github.event.inputs.target)
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.vercel-deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (Vercel)
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel
        id: vercel-deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed frontend: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment deployment URL on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Frontend deployed:** ${{ steps.vercel-deploy.outputs.url }}`
            })

  # ── Deploy backend API → Railway ────────────────────────────────────
  deploy-backend:
    name: Deploy backend API → Railway
    needs: ci-gate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["all","backend"]'), github.event.inputs.target)
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend API service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ github.event.inputs.environment || 'production' }} \
            --service ${{ secrets.RAILWAY_API_SERVICE_ID }}
          railway up --detach
          echo "✅ Backend API deployment triggered on Railway"

      - name: Wait for Railway deployment health
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          echo "Waiting for API health check…"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API healthy after ${i}×5s"
              exit 0
            fi
            echo "  Attempt $i: status=$STATUS, retrying in 5s…"
            sleep 5
          done
          echo "❌ API did not become healthy within 2 minutes"
          exit 1

      - name: Run post-deploy Alembic migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run --service ${{ secrets.RAILWAY_API_SERVICE_ID }} \
            alembic upgrade head
          echo "✅ Migrations applied"

  # ── Deploy Celery worker → Railway ──────────────────────────────────
  deploy-worker:
    name: Deploy Celery worker → Railway
    needs: ci-gate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(fromJSON('["all","worker"]'), github.event.inputs.target)

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Celery worker service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ github.event.inputs.environment || 'production' }} \
            --service ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}
          railway up --detach
          echo "✅ Celery worker deployment triggered"

  # ── Notify on failure ────────────────────────────────────────────────
  notify-failure:
    name: Notify on deploy failure
    needs: [deploy-frontend, deploy-backend, deploy-worker]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "❌ Deployment failed."
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          echo "Backend:  ${{ needs.deploy-backend.result }}"
          echo "Worker:   ${{ needs.deploy-worker.result }}"
          exit 1
