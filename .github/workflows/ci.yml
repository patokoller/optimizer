name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: lint + type-check ─────────────────────────────────────
  frontend-ci:
    name: Frontend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache — package-lock.json doesn't exist until first npm install

      - name: Install deps
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit || true

      - name: Lint
        run: npx next lint --dir app --dir components --dir lib --dir store || true

  # ── Backend: migrations + tests ──────────────────────────────────────
  backend-ci:
    name: Backend — migrations & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_portfolio
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          pip install \
            "fastapi==0.111.0" "uvicorn[standard]==0.30.1" \
            "pydantic==2.7.3" "sqlalchemy==2.0.30" \
            "psycopg2-binary==2.9.9" "alembic==1.13.1" \
            "celery[redis]==5.4.0" "redis==5.0.6" \
            "anthropic==0.28.0" "requests==2.32.3" \
            "numpy==1.26.4" "pandas==2.2.2" \
            "scikit-learn==1.5.0" "xgboost==2.0.3" \
            "pytest==8.2.2" "httpx==0.27.0" \
            "python-multipart==0.0.9"

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_portfolio
        run: alembic upgrade head

      - name: Benchmark fidelity tests (locked values guard)
        run: python tests/test_benchmark_fidelity.py

      - name: API integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_portfolio
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: "test-stub"
          ALPACA_API_KEY: ""
          ALPACA_SECRET_KEY: ""
          ALPHA_VANTAGE_API_KEY: ""
        run: pytest tests/test_api.py -v --tb=short -x
