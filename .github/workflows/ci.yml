name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: lint + type-check ─────────────────────────────────────
  frontend-ci:
    name: Frontend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ── Backend: test + fidelity check ──────────────────────────────────
  backend-ci:
    name: Backend — pytest & benchmark fidelity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_portfolio
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps (no ML heavyweights for CI speed)
        run: |
          pip install \
            fastapi uvicorn pydantic sqlalchemy psycopg2-binary alembic \
            celery redis anthropic requests pytest pytest-asyncio httpx \
            numpy pandas scikit-learn xgboost

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_portfolio
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_portfolio
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: ""  # Tests stub the API
          ALPACA_API_KEY: ""
          ALPACA_SECRET_KEY: ""
          ALPHA_VANTAGE_API_KEY: ""
        run: pytest tests/ -v --tb=short

      - name: Benchmark fidelity check (locked values)
        run: |
          python tests/test_benchmark_fidelity.py
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_portfolio
