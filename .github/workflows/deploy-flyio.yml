name: Deploy to Fly.io (Phase 3)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Fly.io environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]
      service:
        description: "Service to deploy"
        required: true
        default: "all"
        type: choice
        options: [all, api, worker]

# Only run manually — Phase 3 migration is deliberate, not automatic
jobs:
  deploy-fly:
    name: Deploy → Fly.io
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly auth token "$FLY_API_TOKEN"

      - name: Deploy API process
        if: contains(fromJSON('["all","api"]'), github.event.inputs.service)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly deploy \
            --config fly.toml \
            --dockerfile Dockerfile \
            --strategy rolling \
            --wait-timeout 300 \
            --app ai-portfolio-platform
          echo "✅ API deployed to Fly.io"

      - name: Run Alembic migrations on Fly.io
        if: contains(fromJSON('["all","api"]'), github.event.inputs.service)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console \
            --app ai-portfolio-platform \
            --command "alembic upgrade head"
          echo "✅ Migrations applied"

      - name: Verify health check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          APP_URL: ${{ secrets.FLY_APP_URL }}
        run: |
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Fly.io API healthy after ${i}×10s"
              exit 0
            fi
            echo "  Attempt $i: $STATUS — waiting 10s…"
            sleep 10
          done
          echo "❌ Fly.io API health check failed"
          exit 1

      - name: Scale worker machine
        if: contains(fromJSON('["all","worker"]'), github.event.inputs.service)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly scale count worker=2 --app ai-portfolio-platform
          echo "✅ Celery worker scaled on Fly.io"
